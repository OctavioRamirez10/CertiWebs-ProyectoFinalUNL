<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen - CertiWebs</title>
    
    
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">CertiWebs</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#info">¿Qué es?</a></li>
                <li><a href="index.html#recursos">Guías de Estudio</a></li>
                <li><a href="exams.html">Exámenes</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="user-info">
                <span id="username-display">Usuario</span>
            </div>
        </nav>
    </header>

    <main>
        <div class="exam-header">
            <div class="exam-info">
                <h2 id="exam-title">Cargando examen...</h2>
                <p id="exam-description">Por favor espera...</p>
            </div>
            <div class="timer" id="timer">00:00</div>
        </div>

        <div class="container">
            <div id="loading" class="loading">
                <p>Cargando examen...</p>
            </div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="exam-content" style="display: none;">
                <!-- Las preguntas se cargarán dinámicamente -->
            </div>
            
            <div class="navigation" id="navigation" style="display: none;">
                <div class="progress-indicator" id="progress">
                    <!-- Los puntos de progreso se cargarán dinámicamente -->
                </div>
                <div class="nav-buttons">
                    <button class="btn-nav" id="prev-btn" onclick="previousQuestion()" disabled>Anterior</button>
                    <button class="btn-nav" id="next-btn" onclick="nextQuestion()">Siguiente</button>
                    <button class="btn-submit" id="submit-btn" onclick="submitExam()" style="display: none;">Finalizar Examen</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 CertiWebs. Universidad Nacional del Litoral. Proyecto de Octavio Ramírez.</p>
        <p>Todos los derechos reservados</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
