<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Certificado - CertiWebs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .verification-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: var(--bg-panel);
            border: var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
        }
        .verification-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 0.8rem 1.2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
            font-family: monospace;
            text-transform: uppercase;
        }
        .verification-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
            outline: none;
        }
        .result-card {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .result-success {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .result-error {
            background: rgba(255, 51, 102, 0.05);
            border: 1px solid rgba(255, 51, 102, 0.3);
        }
        .result-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">CertiWebs</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#info">¿Qué es?</a></li>
                <li><a href="index.html#recursos">Guías de Estudio</a></li>
                <li><a href="exams.html">Exámenes</a></li>
                <li><a href="contact.html">Contacto</a></li>
                <li><a href="verificar.html" class="active">Verificar</a></li>
            </ul>
        </nav>
    </header>

    <main class="container flex-grow-1">
        <div class="verification-container">
            <h2 class="text-center mb-3" style="color: var(--neon-cyan); text-shadow: var(--border-glow);">
                <i class="fas fa-shield-alt"></i> Verificar Certificado
            </h2>
            <p class="text-center mb-4" style="color: #cbd5e1; font-size: 1.05rem; line-height: 1.5;">
                Ingresa el código único de validación impreso en el certificado para comprobar su legitimidad en el sistema.
            </p>
            
            <form id="verifyForm">
                <div class="mb-3">
                    <input type="text" id="certCode" class="verification-input" placeholder="Ej: CERT-HTML-1627918239023" required>
                </div>
                <button type="submit" class="btn-principal w-100 py-2.5" style="background: var(--neon-cyan); color: #000; border: none; font-weight: 600; box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);">
                    Verificar Autenticidad
                </button>
            </form>

            <div id="resultBox" class="result-card">
                <!-- Se rellenará dinámicamente -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CertiWebs. Todos los derechos reservados.</p>
    </footer>

    <!-- Cargar dependencias para generación de PDF desde la verificación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="main.js"></script>

    <script>
        // API_URL se obtiene globalmente desde main.js, evitamos re-declaración

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('certCode').value.trim();
            if (!code) return;
            await verifyCertificate(code);
        });

        async function verifyCertificate(code) {
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'none';
            resultBox.className = 'result-card';
            resultBox.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-info" role="status"></div><p class="mt-2 text-muted">Buscando registro...</p></div>';
            resultBox.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/certificado/${encodeURIComponent(code)}`);
                const data = await response.json();

                if (response.ok) {
                    const parseSQLiteDate = (sqliteStr) => {
                        if (!sqliteStr) return new Date();
                        if (sqliteStr.includes('Z') || sqliteStr.includes('+')) return new Date(sqliteStr);
                        return new Date(sqliteStr.replace(' ', 'T') + 'Z');
                    };
                    const fecha = parseSQLiteDate(data.fecha_emision).toLocaleDateString();
                    resultBox.className = 'result-card result-success';
                    resultBox.innerHTML = `
                        <div class="text-center mb-3">
                             <i class="fas fa-check-circle" style="color: var(--neon-green); font-size: 3rem; text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);"></i>
                             <h4 class="mt-2" style="color: var(--neon-green);">Certificado Válido</h4>
                             <p class="small" style="color: rgba(255, 255, 255, 0.9); font-weight: 500; text-shadow: 0 0 5px rgba(255,255,255,0.1);">Este certificado está registrado de forma segura en la base de datos de CertiWebs.</p>
                         </div>
                         <hr style="border-color: rgba(255,255,255,0.1);">
                         <div class="row">
                             <div class="col-md-6">
                                 <div class="result-label">Estudiante</div>
                                 <div class="result-value">${data.username}</div>
                             </div>
                             <div class="col-md-6">
                                 <div class="result-label">Email</div>
                                 <div class="result-value">${data.email}</div>
                             </div>
                             <div class="col-md-6">
                                 <div class="result-label">Certificación Aprobada</div>
                                 <div class="result-value" style="color: var(--neon-cyan);">${data.examen_id.toUpperCase()}</div>
                             </div>
                             <div class="col-md-6">
                                 <div class="result-label">Puntaje Obtenido</div>
                                 <div class="result-value" style="color: var(--neon-green); font-weight: bold;">${data.puntuacion !== undefined && data.puntuacion !== null ? data.puntuacion + '%' : '80% (Est. Aprobado)'}</div>
                             </div>
                             <div class="col-md-6">
                                 <div class="result-label">Fecha de Emisión</div>
                                 <div class="result-value">${fecha}</div>
                             </div>
                             <div class="col-md-6">
                                 <div class="result-label">ID de Registro</div>
                                 <div class="result-value" style="font-family: monospace; font-size: 0.9rem;">${data.codigo_verificacion}</div>
                             </div>
                         </div>
                         <hr style="border-color: rgba(255,255,255,0.1);">
                         <div class="text-center mt-3">
                             <button class="btn-principal py-2 px-4" id="downloadCertBtn" style="background: var(--neon-green); color: #000; border: none; font-weight: 600; border-radius: 20px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); display: inline-flex; align-items: center; gap: 0.5rem;">
                                 <i class="fas fa-file-pdf"></i> Descargar Certificado PDF
                             </button>
                         </div>
                    `;

                    // Asignar evento al botón de descarga
                    document.getElementById('downloadCertBtn').addEventListener('click', async () => {
                        const btn = document.getElementById('downloadCertBtn');
                        const originalContent = btn.innerHTML;
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando PDF...';
                        try {
                            await window.generarCertificadoPDF(data.username, data.examen_id, data.puntuacion !== undefined && data.puntuacion !== null ? data.puntuacion : 80, data.codigo_verificacion, data.fecha_emision);
                        } catch (err) {
                            console.error("Error generando PDF:", err);
                            alert("Hubo un error al generar el archivo PDF.");
                        } finally {
                            btn.disabled = false;
                            btn.innerHTML = originalContent;
                        }
                    });

                } else {
                    showError(data.error || 'Certificado no encontrado');
                }
            } catch (error) {
                console.error(error);
                showError('Error de red o conexión con el servidor.');
            }
        }

        function showError(message) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-card result-error';
            resultBox.innerHTML = `
                <div class="text-center">
                    <i class="fas fa-times-circle" style="color: var(--neon-red); font-size: 3rem; text-shadow: 0 0 15px rgba(255, 51, 102, 0.4);"></i>
                    <h4 class="mt-2" style="color: var(--neon-red);">Verificación Fallida</h4>
                    <p class="small mt-2" style="color: rgba(255, 255, 255, 0.9); font-weight: 500;">${message}</p>
                </div>
            `;
            resultBox.style.display = 'block';
        }

        // Auto-verificar si viene un código en la URL
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const codeParam = params.get('code');
            if (codeParam) {
                document.getElementById('certCode').value = codeParam;
                verifyCertificate(codeParam);
            }
        });
    </script>
</body>
</html>
