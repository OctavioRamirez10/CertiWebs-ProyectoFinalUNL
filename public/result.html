<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - CertiWebs</title>
    <!-- IMPORTANTE: El orden de CSS garantiza el modo oscuro (Neon) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">CertiWebs</div>
            <button class="menu-toggle" id="menuToggleBtn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#info">¿Qué es?</a></li>
                <li><a href="index.html#recursos">Certificaciones</a></li>
                <li><a href="exams.html">Exámenes</a></li>
                <li><a href="contact.html">Contacto</a></li>
                <li><a href="verificar.html">Verificar</a></li>
            </ul>
            <div class="user-info">
                <span id="username-display">
                    <i class="fas fa-user-circle"></i> Usuario
                </span>
                <button id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
            </div>
        </nav>
    </header>

    <main class="container" style="margin-top: 2rem; margin-bottom: 5rem; min-height: 60vh;">
        <div id="result-section">
            <!-- El resultado se cargará dinámicamente desde main.js -->
            <div style="text-align: center; margin-top: 5rem;">
                <p>Cargando resultados...</p>
            </div>
        </div>
    </main>

    <!-- Modal de confirmación de cierre de sesión -->
    <div id="logoutConfirmModal" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h3 style="color: var(--neon-cyan); margin-bottom: 1.5rem;">¿Cerrar sesión?</h3>
            <p style="margin-bottom: 2rem; color: #a0aecb;">¿Estás seguro que deseas salir de tu cuenta?</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn-principal" onclick="document.getElementById('logoutConfirmModal').style.display='none'" style="background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); box-shadow: none;">Cancelar</button>
                <button id="confirmLogoutBtn" class="btn-principal" style="background: var(--neon-red); border: 1px solid var(--neon-red); box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);">Cerrar sesión</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CertiWebs. Todos los derechos reservados.</p>
    </footer>

    <!-- Dependencias para generar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
