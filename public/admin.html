<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - CertiWebs</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:1rem}
    .controls{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem}
    input[type=text]{padding:.5rem;width:320px}
    button{padding:.5rem 1rem}
    section{margin-top:1rem}
    table{width:100%;border-collapse:collapse;margin-top:.5rem;table-layout:fixed}
    th,td{border:1px solid #ddd;padding:.4rem;text-align:left;word-wrap:break-word;word-break:break-all}
    th{background:#f6f6f6}
    .small{font-size:.9rem;color:#555}
  </style>
</head>
<body>
  <h2>Panel Admin — CertiWebs</h2>
  <div class="controls">
    <label class="small">Admin Key:</label>
    <input id="adminKey" type="text" placeholder="Introduce X-Admin-Key o admin_key (env ADMIN_KEY)">
    <button id="loadBtn">Cargar ahora</button>
    <button id="downloadDbBtn" style="background:#0284c7;color:#fff;border:none;border-radius:4px;cursor:pointer;padding:.5rem 1rem;">Descargar BD (.db)</button>
    <label class="small"><input id="autoRefresh" type="checkbox"> Auto-refresh (5s)</label>
    <span id="status" class="small"></span>
  </div>

  <section id="overviewSection">
    <h3>Resumen</h3>
    <pre id="overview" class="small">Cargando...</pre>
  </section>

  <section id="usersSection">
    <h3>Usuarios</h3>
    <div id="users"></div>
  </section>

  <section id="examsSection">
    <h3>Exámenes completados</h3>
    <div id="exams"></div>
  </section>

  <section id="certsSection">
    <h3>Certificados</h3>
    <div id="certs"></div>
  </section>

  <section id="subsSection">
    <h3>Suscripciones / Boletín</h3>
    <div id="subs"></div>
  </section>

  <section id="contactsSection">
    <h3>Formularios de Contacto Completados</h3>
    <div id="contacts"></div>
  </section>

  <script src="/admin.js"></script>
</body>
</html>
